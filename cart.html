<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Task</title>
    <style>
        /* Setup: Ensuring page is scrollable as requested */
        body {
            height: 3000px;
            margin: 0;
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f0f0f0;
        }

        /* 1. Absolute Close Button */
        .close-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: black;
            color: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
        }

        /* 2. Fixed Video/Div Box */
        .fixed-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            height: 180px;
            background-color: gray;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 100;
        }

        /* 3. Product Card Container */
        .product-container {
            display: inline-block;
            position: relative; /* Essential for absolute children */
            margin-top: 100px;
            width: 250px;
        }

        .product-image {
            width: 100%;
            display: block;
        }

        /* Discount Badge - Absolute inside Relative */
        .discount-badge {
            position: absolute;
            top: 0;
            right: 0;
            background-color: black;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
        }

        /* Overlay with Add to Cart button */
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-to-cart {
            background-color: white;
            border: 1px solid #ccc;
            padding: 5px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="close-button">X</div>

    <div class="product-container">
        <img src="https://images.unsplash.com/photo-1596755094514-f87e34085b2c?auto=format&fit=crop&w=400" alt="Shirt" class="product-image">
        <div class="discount-badge">20% OFF</div>
        <div class="overlay">
            <button class="add-to-cart">Add to Cart</button>
        </div>
    </div>

    <div class="fixed-box">
        Fixed Video Box
    </div>

</body>
</html>
